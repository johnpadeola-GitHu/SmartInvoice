name               = "smartinvoice-worker"
main               = "worker.js"
compatibility_date = "2024-09-23"

# ── D1 Database ───────────────────────────────────────────────
# Run first:  wrangler d1 create smartinvoice
# Then paste the database_id below
[[d1_databases]]
binding       = "DB"
database_name = "smartinvoice"
database_id   = "PASTE_YOUR_D1_DATABASE_ID_HERE"

# ── R2 Storage ────────────────────────────────────────────────
# Run first:  wrangler r2 bucket create smartinvoice-files
# Then enable public access in Cloudflare Dashboard:
#   R2 → smartinvoice-files → Settings → Public Access → Enable
# Copy the public URL and paste it as R2_PUBLIC_URL in [vars] below
[[r2_buckets]]
binding     = "BUCKET"
bucket_name = "smartinvoice-files"

# ── Non-sensitive config ──────────────────────────────────────
[vars]
FRONTEND_URL    = "https://smartinvoice.pages.dev"
COMMISSION_RATE = "0.10"
MIN_PAYOUT_KOBO = "500000"
R2_PUBLIC_URL   = "https://pub-XXXX.r2.dev"

# ── Secrets (never stored here — set via CLI) ─────────────────
# Run these once from inside the worker/ folder:
#
#   wrangler secret put PAYSTACK_SECRET_KEY
#   wrangler secret put LICENSE_SECRET
#   wrangler secret put ADMIN_SECRET
